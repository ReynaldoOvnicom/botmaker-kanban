<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Conversaciones · Botmaker</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #e2e8f0;
      --text-muted: #8892b0;
      --radius: 10px;
      --card-radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* CONFIG SCREEN */
    #config-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 420px; }
    .config-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .config-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 9px 12px; outline: none; transition: border-color .2s; }
    .form-group input:focus, .form-group select:focus { border-color: #3b9eff; }
    .form-group select option { background: var(--surface2); }
    .btn-primary { width: 100%; background: #3b9eff; border: none; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; padding: 11px; cursor: pointer; transition: opacity .2s; }
    .btn-primary:hover { opacity: .85; }

    /* MAIN APP */
    #app { display: none; flex-direction: column; height: 100vh; }

    /* TOPBAR */
    .topbar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .topbar-title { font-size: 14px; font-weight: 600; flex: 1; }
    .topbar-meta { font-size: 11px; color: var(--text-muted); }
    .countdown { font-size: 11px; color: var(--text-muted); min-width: 24px; text-align: right; }
    .icon-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 12px; padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: color .2s; white-space: nowrap; }
    .icon-btn:hover { color: var(--text); }
    .icon-btn.spinning svg { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FILTERBAR */
    .filterbar { display: flex; gap: 8px; padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; align-items: center; }
    .filter-chip { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all .15s; }
    .filter-chip.active { color: #fff; border-color: transparent; }
    .filter-chip[data-filter="all"].active { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .filter-chip[data-filter="whatsapp"].active { background: #25d366; }
    .filter-chip[data-filter="webchat"].active { background: #3b9eff; }
    .filter-chip[data-filter="facebook"].active { background: #1877f2; }
    .filter-chip[data-filter="instagram"].active { background: #e1306c; }
    .empty-toggle { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; margin-left: 4px; }
    .empty-toggle input { accent-color: #3b9eff; }

    /* TOTAL BAR */
    .total-bar { padding: 5px 14px; font-size: 11px; color: var(--text-muted); background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .total-bar strong { color: var(--text); }

    /* ERROR BAR */
    #error-bar { display: none; background: rgba(255,107,107,.1); border-bottom: 1px solid rgba(255,107,107,.3); color: #ff6b6b; font-size: 12px; padding: 7px 14px; }

    /* BOARD */
    .board { display: flex; gap: 12px; padding: 12px; overflow-x: auto; flex: 1; align-items: flex-start; }

    /* COLUMN */
    .column { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 260px; min-width: 260px; flex-shrink: 0; display: flex; flex-direction: column; max-height: calc(100vh - 130px); }
    .col-header { display: flex; align-items: center; gap: 8px; padding: 11px 12px; border-bottom: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; flex-shrink: 0; }
    .col-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .col-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .col-subtitle { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .col-count { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; background: var(--surface2); flex-shrink: 0; }
    .col-body { overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* CARD */
    .card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 10px 11px; cursor: pointer; transition: border-color .15s, transform .1s; text-decoration: none; display: block; }
    .card:hover { border-color: rgba(255,255,255,.2); transform: translateY(-1px); }
    .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; color: #fff; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-contact { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-time { font-size: 10px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .card-time.urgent { color: #ff6b6b; font-weight: 600; }
    .card-time.warning { color: #ffc107; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 3px; }
    .badge { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); white-space: nowrap; }
    .badge.queue { color: #a78bfa; border-color: rgba(167,139,250,.3); }
    .badge.agent { color: #34d399; border-color: rgba(52,211,153,.3); }
    .col-empty { text-align: center; padding: 28px 12px; color: var(--text-muted); font-size: 12px; }

    /* LOADING */
    #loading-overlay { position: fixed; inset: 0; background: rgba(15,17,23,.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 12px; font-size: 13px; color: var(--text-muted); }
    .loader { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: #3b9eff; border-radius: 50%; animation: spin .7s linear infinite; }

    /* ALIASES MODAL */
    #aliases-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    #aliases-modal.open { display: flex; }
    .modal-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 540px; max-height: 80vh; display: flex; flex-direction: column; }
    .modal-header { display: flex; align-items: center; padding: 15px 18px; border-bottom: 1px solid var(--border); gap: 10px; }
    .modal-header h3 { font-size: 15px; font-weight: 600; flex: 1; }
    .modal-header p { font-size: 12px; color: var(--text-muted); }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; }
    .modal-close:hover { color: var(--text); }
    .modal-body { overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 9px; }
    .alias-row { display: flex; align-items: center; gap: 9px; }
    .alias-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .alias-original { font-size: 11px; color: var(--text-muted); width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .alias-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 7px 10px; outline: none; transition: border-color .2s; }
    .alias-input:focus { border-color: #3b9eff; }
    .alias-status { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
    .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .btn-secondary { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 8px 16px; cursor: pointer; }
    .btn-secondary:hover { color: var(--text); }
    .btn-save { background: #3b9eff; border: none; border-radius: 6px; color: #fff; font-size: 13px; font-weight: 600; padding: 8px 20px; cursor: pointer; }
    .btn-save:hover { opacity: .85; }
    .btn-save:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>

<!-- CONFIG SCREEN -->
<div id="config-screen">
  <div class="config-card">
    <h2>📊 Kanban Conversaciones</h2>
    <p>Ingresa tu Access Token de Botmaker. Se mantiene en memoria de la sesión.</p>
    <div class="form-group">
      <label>Access Token</label>
      <input type="password" id="input-token" placeholder="eyJhbGciOiJ..." />
    </div>
    <div class="form-group">
      <label>Rango de tiempo</label>
      <select id="input-days">
        <option value="1">Últimas 24 horas</option>
        <option value="3">Últimos 3 días</option>
        <option value="7" selected>Últimos 7 días</option>
        <option value="14">Últimas 2 semanas</option>
      </select>
    </div>
    <button class="btn-primary" onclick="startApp()">Ver Kanban →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="loading-overlay">
    <div class="loader"></div>
    <span id="loading-text">Cargando…</span>
  </div>

  <div class="topbar">
    <span class="topbar-title">📊 Kanban · Conversaciones por Canal</span>
    <span class="topbar-meta" id="last-updated"></span>
    <span class="countdown" id="countdown-display"></span>
    <button class="icon-btn" id="refresh-btn" onclick="refreshData()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
      Actualizar
    </button>
    <button class="icon-btn" onclick="openAliases()" title="Renombrar canales">✏️ Aliases</button>
    <button class="icon-btn" onclick="showConfig()">⚙</button>
  </div>

  <div id="error-bar"></div>

  <div class="filterbar">
    <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">Todos</button>
    <button class="filter-chip" data-filter="whatsapp" onclick="setFilter('whatsapp')">📱 WhatsApp</button>
    <button class="filter-chip" data-filter="webchat" onclick="setFilter('webchat')">💬 Webchat</button>
    <button class="filter-chip" data-filter="facebook" onclick="setFilter('facebook')">📘 Facebook</button>
    <button class="filter-chip" data-filter="instagram" onclick="setFilter('instagram')">📷 Instagram</button>
    <label class="empty-toggle">
      <input type="checkbox" id="show-empty" onchange="renderBoard()"> Ver canales vacíos
    </label>
  </div>

  <div class="total-bar" id="total-bar"></div>
  <div class="board" id="board"></div>
</div>

<!-- ALIASES MODAL -->
<div id="aliases-modal">
  <div class="modal-panel">
    <div class="modal-header">
      <div style="flex:1">
        <h3>✏️ Nombres de canales</h3>
        <p>Los nombres se guardan en Botmaker vía PATCH /channels/{id}</p>
      </div>
      <button class="modal-close" onclick="closeAliases()">×</button>
    </div>
    <div class="modal-body" id="aliases-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeAliases()">Cancelar</button>
      <button class="btn-save" id="save-btn" onclick="saveAliases()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const API_BASE = 'https://api.botmaker.com/v2.0';
const REFRESH_SEC = 60;

const PLATFORMS = {
  whatsapp:  { label: 'WhatsApp',  icon: '📱', color: '#25d366', dim: 'rgba(37,211,102,.15)'  },
  webchat:   { label: 'Webchat',   icon: '💬', color: '#3b9eff', dim: 'rgba(59,158,255,.15)'  },
  facebook:  { label: 'Facebook',  icon: '📘', color: '#1877f2', dim: 'rgba(24,119,242,.15)'  },
  instagram: { label: 'Instagram', icon: '📷', color: '#e1306c', dim: 'rgba(225,48,108,.15)'  },
  other:     { label: 'Otros',     icon: '🔗', color: '#9b59b6', dim: 'rgba(155,89,182,.15)'  },
};

// ── STATE ──────────────────────────────────────────────────────────────────────
let token = '';
let daysBack = 7;
let allChats = [];
let channelMap = {};   // channelId → channel object (with .name, .number, .platform)
let activeFilter = 'all';
let countdownTimer = null;

// Auto-start from URL param
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('token')) {
  token = urlParams.get('token');
  daysBack = parseInt(urlParams.get('days') || '7');
  document.getElementById('config-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData();
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function getPlatform(channelId) {
  if (!channelId) return 'other';
  const id = channelId.toLowerCase();
  if (id.includes('-whatsapp-'))  return 'whatsapp';
  if (id.includes('-webchat-'))   return 'webchat';
  if (id.includes('-facebook-') || id.includes('-messenger-')) return 'facebook';
  if (id.includes('-instagram-')) return 'instagram';
  return 'other';
}

// Raw identifier shown as subtitle / placeholder
function getRawLabel(ch) {
  if (!ch) return '';
  if (ch.number) return `+${ch.number}`;
  return ch.id || '';
}

// Display label — prefers .name set in Botmaker
function getDisplayLabel(ch) {
  if (!ch) return 'Canal desconocido';
  if (ch.name && ch.name.trim()) return ch.name.trim();
  return getRawLabel(ch) || ch.id || 'Sin nombre';
}

function getInitials(first, last) {
  const a = (first || '').trim()[0] || '';
  const b = (last  || '').trim()[0] || '';
  return (a + b).toUpperCase() || '?';
}

function timeSince(dateStr) {
  if (!dateStr) return null;
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (diff < 60)   return { label: `${diff}s`,              urgent: diff > 300 };
  if (diff < 3600) { const m = Math.floor(diff/60);  return { label: `${m}m`, urgent: m > 30, warning: m > 10 }; }
  if (diff < 86400){ const h = Math.floor(diff/3600); return { label: `${h}h`, urgent: h > 4,  warning: h > 1  }; }
  return { label: `${Math.floor(diff/86400)}d`, urgent: false };
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── APP FLOW ───────────────────────────────────────────────────────────────────
function startApp() {
  const t = document.getElementById('input-token').value.trim();
  if (!t) { alert('Ingresa un Access Token válido.'); return; }
  token = t;
  daysBack = parseInt(document.getElementById('input-days').value);
  document.getElementById('config-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData();
}

function showConfig() {
  clearInterval(countdownTimer);
  document.getElementById('app').style.display = 'none';
  document.getElementById('config-screen').style.display = 'flex';
}

// ── DATA ───────────────────────────────────────────────────────────────────────
async function loadData() {
  showLoading(true);
  showError(null);
  try {
    setLoadingText('Cargando canales…');
    const chRes = await apiFetch('/channels');
    channelMap = {};
    (chRes.items || []).forEach(c => { channelMap[c.id] = c; });

    setLoadingText('Cargando conversaciones…');
    const from = new Date();
    from.setDate(from.getDate() - daysBack);
    const chatRes = await apiFetch(`/chats?from=${from.toISOString()}`);
    allChats = chatRes.items || [];

    let nextPage = chatRes.nextPage;
    while (nextPage && allChats.length < 1000) {
      setLoadingText(`Cargando más… (${allChats.length})`);
      const next = await apiFetchUrl(nextPage);
      allChats = allChats.concat(next.items || []);
      nextPage = next.nextPage;
    }

    renderBoard();
    document.getElementById('last-updated').textContent = `Actualizado: ${new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}`;
    startCountdown();
  } catch(err) {
    showError(`Error: ${err.message}`);
  } finally {
    showLoading(false);
  }
}

async function refreshData() {
  clearInterval(countdownTimer);
  document.getElementById('refresh-btn').classList.add('spinning');
  await loadData();
  document.getElementById('refresh-btn').classList.remove('spinning');
}

async function apiFetch(path) {
  const res = await fetch(`${API_BASE}${path}`, { headers: { 'access-token': token } });
  if (!res.ok) throw new Error(`HTTP ${res.status} en ${path}`);
  return res.json();
}

async function apiFetchUrl(url) {
  const res = await fetch(url, { headers: { 'access-token': token } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── BOARD ──────────────────────────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const showEmpty = document.getElementById('show-empty')?.checked;

  // Group chats by channelId
  const chatsByChannel = {};
  allChats.forEach(chat => {
    const cid = chat.chat?.channelId || '__unknown__';
    if (!chatsByChannel[cid]) chatsByChannel[cid] = [];
    chatsByChannel[cid].push(chat);
  });

  // All channel IDs: known from API + any found in chat data
  const allIds = new Set([...Object.keys(channelMap), ...Object.keys(chatsByChannel)]);

  // Filter by platform
  let ids = [...allIds].filter(cid => activeFilter === 'all' || getPlatform(cid) === activeFilter);

  // Optionally hide empty
  if (!showEmpty) ids = ids.filter(cid => (chatsByChannel[cid] || []).length > 0);

  // Sort: platform order, then display label
  const platOrder = ['whatsapp', 'facebook', 'instagram', 'webchat', 'other'];
  ids.sort((a, b) => {
    const diff = platOrder.indexOf(getPlatform(a)) - platOrder.indexOf(getPlatform(b));
    if (diff !== 0) return diff;
    return getDisplayLabel(channelMap[a]).localeCompare(getDisplayLabel(channelMap[b]));
  });

  // Total bar
  const visibleChats = allChats.filter(c => activeFilter === 'all' || getPlatform(c.chat?.channelId) === activeFilter);
  const counts = {};
  visibleChats.forEach(c => { const p = getPlatform(c.chat?.channelId); counts[p] = (counts[p]||0)+1; });
  const summary = Object.entries(counts).map(([p,n]) => `${PLATFORMS[p]?.icon||'🔗'} ${PLATFORMS[p]?.label||p}: <strong>${n}</strong>`).join(' · ');
  document.getElementById('total-bar').innerHTML =
    `<strong>${visibleChats.length}</strong> conversaciones · <strong>${ids.length}</strong> canales &nbsp; ${summary}`;

  if (ids.length === 0) {
    board.innerHTML = `<div style="color:var(--text-muted);font-size:13px;padding:32px;">Sin conversaciones en el período seleccionado.</div>`;
    return;
  }

  ids.forEach(cid => {
    const ch = channelMap[cid] || { id: cid, platform: getPlatform(cid) };
    board.appendChild(buildColumn(ch, chatsByChannel[cid] || []));
  });
}

function buildColumn(ch, chats) {
  const plat = ch.platform || getPlatform(ch.id || '');
  const cfg  = PLATFORMS[plat] || PLATFORMS.other;
  const displayLabel = getDisplayLabel(ch);
  const rawLabel     = getRawLabel(ch);
  const subtitle     = (displayLabel !== rawLabel && rawLabel) ? `${rawLabel} · ${cfg.label}` : cfg.label;
  const safeId       = (ch.id || 'unknown').replace(/[^a-z0-9]/gi, '_');

  chats.sort((a, b) => {
    const da = new Date(a.lastUserMessageDatetime || a.lastSessionCreationTime || a.creationTime || 0);
    const db = new Date(b.lastUserMessageDatetime || b.lastSessionCreationTime || b.creationTime || 0);
    return db - da;
  });

  const col = document.createElement('div');
  col.className = 'column';
  col.innerHTML = `
    <div class="col-header" title="${escHtml(ch.id||'')}">
      <div class="col-icon" style="background:${cfg.dim};color:${cfg.color};">${cfg.icon}</div>
      <div style="flex:1;min-width:0;">
        <div class="col-title">${escHtml(displayLabel)}</div>
        <div class="col-subtitle">${escHtml(subtitle)}</div>
      </div>
      <span class="col-count" style="color:${cfg.color}">${chats.length}</span>
    </div>
    <div class="col-body" id="cb_${safeId}"></div>`;

  const body = col.querySelector(`#cb_${safeId}`);
  if (chats.length === 0) {
    body.innerHTML = `<div class="col-empty">💬<br>Sin conversaciones</div>`;
  } else {
    chats.forEach(chat => body.appendChild(buildCard(chat, cfg)));
  }
  return col;
}

function buildCard(chat, cfg) {
  const first = chat.firstName || '';
  const last  = chat.lastName  || '';
  const name  = [first,last].filter(Boolean).join(' ') || chat.chat?.contactId || 'Sin nombre';
  const contactId = chat.chat?.contactId || '';
  const chatId    = chat.chat?.chatId    || '';
  const ts    = timeSince(chat.lastUserMessageDatetime || chat.lastSessionCreationTime);
  const queue = chat.queueId || null;
  const tags  = (chat.tags || []).slice(0, 2);

  const card = document.createElement('a');
  card.className = 'card';
  card.href = chatId ? `https://go.botmaker.com/#/chats/${chatId}` : '#';
  card.target = '_blank';
  card.rel = 'noopener';

  const timeClass = ts?.urgent ? 'urgent' : (ts?.warning ? 'warning' : '');
  const timeHtml  = ts ? `<span class="card-time ${timeClass}">${ts.label}</span>` : '';

  let meta = '';
  if (queue) meta += `<span class="badge queue">📋 ${escHtml(queue)}</span>`;
  tags.forEach(t => { meta += `<span class="badge">${escHtml(t)}</span>`; });

  card.innerHTML = `
    <div class="card-top">
      <div class="avatar" style="background:${cfg.dim};color:${cfg.color};">${escHtml(getInitials(first,last))}</div>
      <div class="card-info">
        <div class="card-name">${escHtml(name)}</div>
        <div class="card-contact">${escHtml(contactId)}</div>
      </div>
      ${timeHtml}
    </div>
    ${meta ? `<div class="card-meta">${meta}</div>` : ''}`;
  return card;
}

// ── FILTERS ────────────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  renderBoard();
}

// ── COUNTDOWN ──────────────────────────────────────────────────────────────────
function startCountdown() {
  clearInterval(countdownTimer);
  let v = REFRESH_SEC;
  document.getElementById('countdown-display').textContent = v + 's';
  setInterval(() => {
    v--;
    document.getElementById('countdown-display').textContent = v + 's';
    if (v <= 0) { clearInterval(countdownTimer); refreshData(); }
  }, 1000);
}

function openAliases() {
  var body = document.getElementById('aliases-body');
  body.innerHTML = '';
  var platOrder = ['whatsapp','facebook','instagram','webchat','other'];
  var ids = Object.keys(channelMap).sort(function(a,b){
    var diff = platOrder.indexOf(getPlatform(a)) - platOrder.indexOf(getPlatform(b));
    if (diff !== 0) return diff;
    return getRawLabel(channelMap[a]).localeCompare(getRawLabel(channelMap[b]));
  });
  if (ids.length === 0) {
    body.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">Carga el tablero primero.</p>';
    document.getElementById('aliases-modal').classList.add('open');
    return;
  }
  ids.forEach(function(cid) {
    var ch   = channelMap[cid];
    var plat = ch.platform || getPlatform(cid);
    var cfg  = PLATFORMS[plat] || PLATFORMS.other;
    var raw  = getRawLabel(ch);
    var row  = document.createElement('div');
    row.className = 'alias-row';
    row.innerHTML =
      '<div class="alias-icon" style="background:'+cfg.dim+';color:'+cfg.color+';">'+cfg.icon+'</div>'+
      '<div class="alias-original" title="'+escHtml(cid)+'">'+escHtml(raw||cid)+'</div>'+
      '<input class="alias-input" data-channel-id="'+escHtml(cid)+'" data-original-name="'+escHtml(ch.name||'')+'" placeholder="Nombre del canal..." value="'+escHtml(ch.name||'')+'" maxlength="60" />'+
      '<span class="alias-status" data-cid="'+escHtml(cid)+'"></span>';
    body.appendChild(row);
  });
  document.getElementById('aliases-modal').classList.add('open');
}

function closeAliases() {
  document.getElementById('aliases-modal').classList.remove('open');
}

async function saveAliases() {
  var inputs = Array.from(document.querySelectorAll('.alias-input'));
  var changed = inputs.filter(function(i){ return i.value.trim() !== i.dataset.originalName; });
  if (changed.length === 0) { closeAliases(); return; }
  var btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Guardando 0/' + changed.length + '...';
  var done = 0;
  for (var i = 0; i < changed.length; i++) {
    var input = changed[i];
    var cid = input.dataset.channelId;
    var newName = input.value.trim();
    var statusEl = document.querySelector('.alias-status[data-cid="' + CSS.escape(cid) + '"]');
    try {
      var res = await fetch(API_BASE + '/channels/' + encodeURIComponent(cid), {
        method: 'PATCH',
        headers: { 'access-token': token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      if (channelMap[cid]) channelMap[cid].name = newName;
      if (statusEl) { statusEl.textContent = 'OK'; statusEl.style.color = '#34d399'; }
    } catch(e) {
      if (statusEl) { statusEl.textContent = 'ERR'; statusEl.style.color = '#ff6b6b'; }
    }
    done++;
    btn.textContent = 'Guardando ' + done + '/' + changed.length + '...';
  }
  btn.disabled = false;
  btn.textContent = 'Guardar';
  renderBoard();
  setTimeout(closeAliases, 900);
}

function showLoading(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }
function setLoadingText(t) { document.getElementById('loading-text').textContent = t; }
function showError(msg) {
  var bar = document.getElementById('error-bar');
  bar.style.display = msg ? 'block' : 'none';
  if (msg) bar.textContent = msg;
}
</script>
